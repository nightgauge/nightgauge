# Dockerized Mattermost integration test harness for issue #3381 —
# Mattermost server + slash-command end-to-end tests. Pinned image,
# separate Postgres backend, deterministic admin bootstrap via REST.
# Named volumes (not anonymous) so `down -v` removes them by name.
# See docs/TESTING.md for the upgrade cadence policy and local-run
# instructions, and the issue knowledge base for the architecture
# decisions (.nightgauge/knowledge/features/3381-.../decisions.md).

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: mattermost
      POSTGRES_DB: mattermost
    volumes:
      - mm-postgres:/var/lib/postgresql/data
    networks:
      - mm-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mattermost"]
      interval: 5s
      timeout: 3s
      retries: 10

  mattermost:
    image: mattermost/mattermost-team-edition:9.11.3
    container_name: mattermost-ce
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://mattermost:mattermost@postgres:5432/mattermost?sslmode=disable"
      MM_SERVICESETTINGS_SITEURL: "http://localhost:${MATTERMOST_E2E_PORT:-8065}"
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      MM_SERVICESETTINGS_ALLOWEDUNTRUSTEDINTERNALCONNECTIONS: "localhost 127.0.0.1 host.docker.internal 172.17.0.1"
      MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS: "true"
      MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS: "true"
      MM_SERVICESETTINGS_ENABLECOMMANDS: "true"
      MM_SERVICESETTINGS_ENABLEPOSTUSERNAMEOVERRIDE: "true"
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "true"
    ports:
      - "${MATTERMOST_E2E_PORT:-8065}:8065"
    volumes:
      - mm-config:/mattermost/config
      - mm-data:/mattermost/data
      - mm-logs:/mattermost/logs
    networks:
      - mm-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8065/api/v4/system/ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

volumes:
  mm-postgres:
  mm-config:
  mm-data:
  mm-logs:

networks:
  mm-net:
    driver: bridge
