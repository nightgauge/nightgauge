    - 98719ef88334fbd5e627adec217ce65d84a9f136478d06d97c4b116ae0ba54cc
    # Private companion-repository identifiers and the retired dogfood Project
    # identifiers. Plaintext provenance is retained only in nightgauge-internal.
    - aade25025ffb3a36dabece86c90cc9b44ab0838ada9c06ed1c8b9e39dac6eb95
    - 581a1605412ee89a1bc3205338a55053527051f2a6f6f955bef265d1d40ba97d
    - 0b77e820cfdf4c3735785ca93054804e5dd3dab6d1ca4f518dfdab03530cffeb
