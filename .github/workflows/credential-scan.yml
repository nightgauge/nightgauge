name: credential-scan

# A credential committed once and deleted later stays in history forever, and
# would be exposed by any future visibility flip. So this scans ALL commits, not
# just the diff — a clean HEAD proves nothing on its own.
#
# This is a standing control, not the one-time sweep from #121.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: credential scan (tree + full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history. `fetch-depth: 0` is the whole point of this job —
          # with a shallow clone gitleaks would scan a single commit and pass,
          # which is exactly the false confidence we are trying to avoid.
          fetch-depth: 0

      - name: Install gitleaks
        # Detect the runner OS/architecture and install without sudo.
        #
        # If gitleaks cannot be obtained this step FAILS. It must never be
        # skipped: a credential scan that silently does not run is worse than
        # none, because the green check says the opposite.
        run: |
          set -euo pipefail
          VERSION=8.30.1
          if command -v gitleaks >/dev/null 2>&1; then
            echo "gitleaks already present: $(gitleaks version)"
            exit 0
          fi
          case "$(uname -s)" in
            Linux)  OS=linux  ;;
            Darwin) OS=darwin ;;
            *) echo "::error::unsupported OS $(uname -s) — cannot run the credential scan"; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64|amd64) ARCH=x64 ;;
            arm64|aarch64) ARCH=arm64 ;;
            *) echo "::error::unsupported arch $(uname -m) — cannot run the credential scan"; exit 1 ;;
          esac
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/bin" gitleaks
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/bin/gitleaks" version

      - name: Scan all commits
        # Allowlist lives in .gitleaksignore as per-finding FINGERPRINTS, not
        # path globs — a blanket `tests/**` ignore would silently swallow a real
        # credential the day someone pastes one into a test.
        run: gitleaks git --no-banner --redact --verbose
