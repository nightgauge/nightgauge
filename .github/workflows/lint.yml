# Lint — formatting, ESLint, license-header guard, skill metadata.
name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Prettier (format check)
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: License-header guard (no proprietary markers)
        run: bash scripts/check-license-headers.sh
      - name: SKILL.md metadata
        run: bash scripts/validate-skill-metadata.sh

  link-check:
    # Validates cross-document reference integrity across root *.md + docs/**
    # (config + scope: .markdown-link-check.json). Standing gate from #135.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Markdown link check (docs cross-references)
        run: bash scripts/check-md-links.sh
