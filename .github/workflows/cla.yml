name: licence

# First-party CLA gate. The workflow never checks out or executes fork code.
# Signatures are stored in the private nightgauge/.cla-signatures repository.
on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write # PR comments require this on cross-repository contributions
  statuses: write

jobs:
  cla-workflow:
    if: >
      github.event.repository.visibility == 'public' &&
      ((github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      github.event_name == 'pull_request_target')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          persist-credentials: false
      - name: Verify CLA agreement
        run: node .github/scripts/cla-check.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLA_SIGNATURES_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
          CLA_SIGNATURES_REPOSITORY: nightgauge/.cla-signatures
          CLA_SIGNATURES_PATH: signatures/version1/cla.json
          CLA_CORPORATE_SIGNATURES_PATH: signatures/version1/corporate.json
