# Nightgauge Configuration
# Generated by `nightgauge config init` — safe to edit
# Docs: https://github.com/nightgauge/nightgauge/docs/CONFIGURATION.md

# GitHub identity (must match Go config parser — top-level owner/repo required)
owner: nightgauge
owner_type: org # "org" for organizations, "user" for personal accounts
repo: nightgauge

project:
  # Project owner and type — must match the GitHub project's owner.
  # Duplicates top-level owner/owner_type for explicitness; Go parser uses
  # project.owner first and falls back to top-level owner if missing.
  owner: nightgauge
  owner_type: org

  # GitHub Project number (from URL: /orgs/OWNER/projects/NUMBER or /users/OWNER/projects/NUMBER)
  number: 1

  # GraphQL Node ID of the project itself
  id: "PVT_kwDOAslWDM4BPD3-"

  # Field IDs and option mappings (auto-discovered by `config init --project N` —
  # do not edit manually). These MUST use the nested structure with id + options
  # for each field.
  fields:
    status:
      id: "PVTSSF_lADOAslWDM4BPD3-zg9lKDw"
      options:
        backlog: "f75ad846"
        ready: "61e4505c"
        in-progress: "47fc9ee4"
        in-review: "df73e18b"
        done: "98236657"
    priority:
      id: "PVTSSF_lADOAslWDM4BPD3-zg9lKEU"
      options:
        p0: "8f87a3ca"
        p1: "fb4682e2"
        p2: "98303a66"
        p3: "82f1ea49"
    size:
      id: "PVTSSF_lADOAslWDM4BPD3-zg9lKEY"
      options:
        xs: "6c6483d2"
        s: "f784b110"
        m: "7515a9f1"
        l: "817d0097"
        xl: "db339eb2"

  # Sprint/Iteration support (optional)
  sprint:
    enabled: false
    field_name: "Sprint"
    auto_assign: false

# Pipeline defaults
pipeline:
  auto_fix: true # Auto-fix linting issues during feature development
  adversarial_review:
    enabled: true # Fresh-eyes LLM critics gate feature-validate (#4097)
  grounding_gate:
    enabled: true # Pre-feature-dev am-I-on-the-right-branch grounding check (#4099)
  architecture_approval:
    enabled: true # Require human approval for high-impact architectural decisions (#4098)

# Sanitization (prompt injection protection)
sanitization:
  enabled: true
  warn_only: false

# Human-in-the-loop gates
human_in_the_loop:
  auto_accept_stages: false # Require approval between pipeline stages
  auto_accept_permissions: false # Require approval for tool permission prompts

# Knowledge base — persistent context per issue (PRD + decision logs)
knowledge:
  enabled: false # Set to true to enable automatic knowledge scaffolding
  auto_scaffold: true # Scaffold automatically on issue pickup (requires enabled: true)
