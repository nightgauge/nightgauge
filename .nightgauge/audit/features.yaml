# Canonical feature definitions for the Feature Parity Matrix (Dimension 4)
# Each feature defines grep patterns per client to detect implementation evidence.
# Patterns are case-sensitive string literals (no regex anchors required).
#
# Rating logic:
#   FULL    — ≥1 code pattern match AND ≥1 test_pattern match
#   PARTIAL — ≥1 code pattern match, no test match (or no test_patterns defined)
#   STUB    — exactly 1 code match, no test match
#   MISSING — no code pattern matches
#
# Maintenance: Update patterns when feature implementations change.
# Add test_patterns once tests are written.

features:
  - name: "Epic Dashboard"
    vscode:
      patterns:
        - "class EpicDashboard"
        - "getAllCrossRepoProgress"
      test_patterns:
        - "EpicDashboard"
    angular:
      patterns:
        - "EpicDashboardComponent"
        - "epicService.getAllEpics"
    flutter:
      patterns:
        - "EpicListScreen"
        - "epicController.fetch"

  - name: "Pipeline Execution"
